name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, architecture lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run check
      - name: Architecture lint (dependency-cruiser)
        run: npm run lint:architecture
      - name: Build
        run: npm run build

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: rassco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d rassco_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # JWT_SECRET / SESSION_SECRET default to dummies in vitest.config.ts.
      DATABASE_URL: postgres://test:test@localhost:5432/rassco_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # migrations/ do not apply cleanly to an empty DB (duplicate index in
      # 0018/0020); provision the schema directly from the Drizzle definitions.
      - name: Provision test schema
        run: npm run db:push:test
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
