# Local development / test PostgreSQL.
#
#   docker compose up -d db
#   export DATABASE_URL=postgres://rassco:rassco@localhost:5432/rassco_dev
#   npm run db:push:test    # apply the Drizzle schema
#   npm run test:coverage   # run the suite against it
#
# The migrations/ sequence does not apply cleanly to an empty database
# (duplicate index in 0018/0020), so tests/CI provision the schema with
# `drizzle-kit push` rather than `migrate`.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rassco
      POSTGRES_PASSWORD: rassco
      POSTGRES_DB: rassco_dev
    ports:
      - "5432:5432"
    volumes:
      - rassco_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rassco -d rassco_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rassco_pgdata:
